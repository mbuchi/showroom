<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Silent SSO</title>
  </head>
  <body>
    <script type="module">
      import { UserManager } from 'https://esm.sh/oidc-client-ts@3.5.0';
      try {
        await new UserManager({ response_mode: 'query' }).signinSilentCallback();
      } catch (err) {
        console.warn('silent callback error', err);
      }
    </script>
  </body>
</html>
